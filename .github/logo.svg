<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <!-- Blue circle background (transparent SVG, no white bg) -->
  <circle 
    cx="100" 
    cy="100" 
    r="95" 
    fill="#4EC0E0" />

  <!-- White rounded board container (creates the framed grid look) -->
  <rect 
    x="33" 
    y="33" 
    width="134" 
    height="134" 
    rx="13" 
    fill="#FAF7F0" />

  <!-- Top-left tile: Orange with 2 -->
  <rect 
    x="41" 
    y="41" 
    width="55" 
    height="55" 
    rx="9" 
    fill="#FF9F1C" 
    stroke="#FFFFFF" 
    stroke-width="3" />

  <!-- Top-right tile: Beige with 0 -->
  <rect 
    x="104" 
    y="41" 
    width="55" 
    height="55" 
    rx="9" 
    fill="#D9C1A8" 
    stroke="#FFFFFF" 
    stroke-width="3" />

  <!-- Bottom-left tile: Pink with 4 -->
  <rect 
    x="41" 
    y="104" 
    width="55" 
    height="55" 
    rx="9" 
    fill="#FF6F7E" 
    stroke="#FFFFFF" 
    stroke-width="3" />

  <!-- Bottom-right tile: Dark red-brown with 8 -->
  <rect 
    x="104" 
    y="104" 
    width="55" 
    height="55" 
    rx="9" 
    fill="#E05A36" 
    stroke="#FFFFFF" 
    stroke-width="3" />

  <!-- Numbers (centered, bold, proper contrast) -->
  
  <!-- 2 (white on orange) -->
  <text 
    x="68.5" 
    y="68.5" 
    text-anchor="middle" 
    dominant-baseline="middle" 
    font-family="'Arial Black', sans-serif" 
    font-size="35" 
    font-weight="bold" 
    fill="#FFFFFF">2</text>

  <!-- 0 (dark on beige) -->
  <text 
    x="131.5" 
    y="68.5" 
    text-anchor="middle" 
    dominant-baseline="middle" 
    font-family="'Arial Black', sans-serif" 
    font-size="35" 
    font-weight="bold" 
    fill="#2E2E2E">0</text>

  <!-- 4 (white on pink) -->
  <text 
    x="68.5" 
    y="131.5" 
    text-anchor="middle" 
    dominant-baseline="middle" 
    font-family="'Arial Black', sans-serif" 
    font-size="35" 
    font-weight="bold" 
    fill="#FFFFFF">4</text>

  <!-- 8 (white on dark red-brown) -->
  <text 
    x="131.5" 
    y="131.5" 
    text-anchor="middle" 
    dominant-baseline="middle" 
    font-family="'Arial Black', sans-serif" 
    font-size="35" 
    font-weight="bold" 
    fill="#FFFFFF">8</text>

</svg>
